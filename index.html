<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pró-Gestão RPPS · Implantação Nível II · Pré-Auditoria de Conformidade</title>
<style>
:root{
  --ink:#13294B;        /* azul-marinho institucional */
  --azul:#1B4B8F;
  --azul-claro:#EAF0F9;
  --ouro:#C9A227;       /* dourado do selo */
  --ouro-escuro:#9A7B1A;
  --papel:#F5F6F8;
  --branco:#FFFFFF;
  --borda:#DDE2EA;
  --texto:#2B3445;
  --suave:#69748A;
  --verde:#2E7D52;
  --verde-bg:#E8F3ED;
  --ambar:#A87718;
  --ambar-bg:#FBF3DF;
  --vinho:#A63D40;
  --vinho-bg:#F9E9E9;
  --cinza-bg:#EEF0F4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--papel);color:var(--texto);font-size:14.5px;line-height:1.55}
h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif}
button{font-family:inherit;cursor:pointer}
select,input,textarea{font-family:inherit;font-size:13.5px;color:var(--texto);border:1px solid var(--borda);border-radius:6px;padding:6px 8px;background:#fff}
select:focus,input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--ouro);outline-offset:1px}
a{color:var(--azul)}

/* ====== layout ====== */
.app{display:flex;min-height:100vh}
aside{width:252px;flex-shrink:0;background:var(--ink);color:#E8ECF4;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.selo-mini{width:46px;height:46px;border-radius:50%;border:2px solid var(--ouro);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;color:var(--ouro);font-size:17px;letter-spacing:.5px;margin-bottom:10px;background:radial-gradient(circle at 30% 30%, rgba(201,162,39,.25), transparent 60%)}
.brand h1{font-size:17px;color:#fff;line-height:1.25}
.brand small{display:block;color:#9FB0CC;font-size:11.5px;margin-top:4px;letter-spacing:.04em;text-transform:uppercase}
nav{padding:12px 10px;flex:1;overflow-y:auto}
nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:#C6D0E2;padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:2px}
nav button .num{font-family:Georgia,serif;color:var(--ouro);width:18px;display:inline-block;font-size:13px}
nav button:hover{background:rgba(255,255,255,.07);color:#fff}
nav button.ativo{background:var(--azul);color:#fff}
.nav-verdict{margin:10px;padding:12px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:12.5px}
.nav-verdict b{display:block;font-size:13px;margin-bottom:2px}
.nav-verdict.ok{border-color:rgba(110,200,150,.5)} .nav-verdict.ok b{color:#7FD8A4}
.nav-verdict.nao b{color:#F0A8A8}
.rodape-side{padding:12px 16px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#8FA0BE}

main{flex:1;min-width:0;padding:26px 30px 60px;max-width:1180px}
.topo{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.topo h2{font-size:24px;color:var(--ink)}
.topo .sub{color:var(--suave);font-size:13.5px;margin-top:3px;max-width:760px}
.acoes-topo{display:flex;gap:8px;flex-wrap:wrap}

/* ====== componentes ====== */
.card{background:var(--branco);border:1px solid var(--borda);border-radius:10px;padding:18px 20px;margin-bottom:14px}
.grid{display:grid;gap:14px}
.grid.c4{grid-template-columns:repeat(4,1fr)}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.grid.c2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1000px){.grid.c4{grid-template-columns:repeat(2,1fr)}.grid.c3{grid-template-columns:1fr}}
.kpi{background:var(--branco);border:1px solid var(--borda);border-radius:10px;padding:14px 16px}
.kpi .v{font-family:Georgia,serif;font-size:30px;color:var(--ink);line-height:1.1}
.kpi .l{font-size:12px;color:var(--suave);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.kpi.ouro{border-top:3px solid var(--ouro)}

.pill{display:inline-block;padding:2.5px 10px;border-radius:99px;font-size:11.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.p-conforme{background:var(--verde-bg);color:var(--verde)}
.p-parcial{background:var(--ambar-bg);color:var(--ambar)}
.p-nao{background:var(--vinho-bg);color:var(--vinho)}
.p-pend{background:var(--cinza-bg);color:var(--suave)}
.p-ess{background:#F3ECD7;color:var(--ouro-escuro);border:1px solid #E2D5A6}
.p-disp{background:#E7ECF6;color:var(--azul)}

.btn{border:1px solid var(--borda);background:#fff;border-radius:8px;padding:8px 14px;font-size:13.5px;color:var(--texto)}
.btn:hover{border-color:var(--azul);color:var(--azul)}
.btn.primario{background:var(--azul);border-color:var(--azul);color:#fff}
.btn.primario:hover{background:#15407E;color:#fff}
.btn.ouro{background:var(--ouro);border-color:var(--ouro);color:#3A2E05}
.btn.ouro:hover{background:#B8941F}
.btn.mini{padding:4px 10px;font-size:12.5px}

.barra{height:8px;background:var(--cinza-bg);border-radius:99px;overflow:hidden}
.barra > i{display:block;height:100%;background:var(--azul);border-radius:99px;transition:width .4s}
.barra.dourada > i{background:var(--ouro)}

/* acordeão de ações */
.acao{background:#fff;border:1px solid var(--borda);border-radius:10px;margin-bottom:10px;overflow:hidden}
.acao.essencial{border-left:4px solid var(--ouro)}
.acao-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;background:#fff}
.acao-head:hover{background:#FAFBFD}
.acao-head .aid{font-family:Georgia,serif;font-weight:700;color:var(--azul);font-size:15px;width:34px;flex-shrink:0}
.acao-head .anome{flex:1;font-weight:600;color:var(--ink);font-size:14.5px}
.acao-head .mini-prog{width:90px;flex-shrink:0}
.acao-body{display:none;border-top:1px solid var(--borda);padding:16px 18px;background:#FCFCFE}
.acao.aberta .acao-body{display:block}
.req-item{display:grid;grid-template-columns:150px 1fr;gap:12px;padding:9px 0;border-bottom:1px dashed #E7EAF0;align-items:start}
.req-item:last-child{border-bottom:none}
.req-item label{font-size:13.5px}
.doc-item{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px dashed #E7EAF0;font-size:13.5px}
.doc-item:last-child{border-bottom:none}
.doc-item select{width:130px;flex-shrink:0}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--suave);font-weight:700;margin:14px 0 6px}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.meta-row label{font-size:12px;color:var(--suave);display:block;margin-bottom:3px}
.resumo-nivel{background:var(--azul-claro);border:1px solid #CBD9EE;border-radius:8px;padding:10px 12px;font-size:13px;color:#28456F;margin-bottom:12px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:var(--ink);color:#fff;text-align:left;padding:8px 10px;font-weight:600;font-size:12.5px}
td{padding:8px 10px;border-bottom:1px solid var(--borda);vertical-align:top}
tr:nth-child(even) td{background:#FAFBFD}
td input,td select{width:100%}

.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filtros button{border:1px solid var(--borda);background:#fff;border-radius:99px;padding:6px 14px;font-size:13px;color:var(--suave)}
.filtros button.ativo{background:var(--ink);color:#fff;border-color:var(--ink)}

.gauge-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.gauge{position:relative;width:170px;height:170px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}
.gauge .centro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .centro b{font-family:Georgia,serif;font-size:34px;color:var(--ink)}
.gauge .centro span{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ouro-escuro);font-weight:700}
.verdict{border-radius:10px;padding:16px 18px;border:1px solid var(--borda)}
.verdict.ok{background:var(--verde-bg);border-color:#BBDCC9}
.verdict.nao{background:var(--vinho-bg);border-color:#E7C2C3}
.verdict h3{font-size:17px;margin-bottom:4px}
.verdict.ok h3{color:var(--verde)} .verdict.nao h3{color:var(--vinho)}
.verdict p{font-size:13.5px}

.modelo-card{display:flex;flex-direction:column;gap:8px}
.modelo-card h3{font-size:15.5px;color:var(--ink)}
.modelo-card p{font-size:13px;color:var(--suave);flex:1}

.aviso{background:var(--ambar-bg);border:1px solid #EAD9A8;border-radius:8px;padding:10px 14px;font-size:13px;color:#6B4F12;margin-bottom:14px}
textarea{width:100%;min-height:54px;resize:vertical}
.obs-box{margin-top:10px}
footer.nota{color:var(--suave);font-size:12px;margin-top:30px;border-top:1px solid var(--borda);padding-top:12px}

/* anexos e análise automática */
.doc-item .dnome{flex:1}
.anexo{display:flex;align-items:center;gap:8px;background:#F4F6FA;border:1px solid var(--borda);border-radius:8px;padding:6px 10px;margin:4px 0 4px 142px;font-size:12.5px}
.anexo .nome{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:var(--ink)}
.an-det{margin:2px 0 10px 142px;background:#FBFBFD;border:1px dashed var(--borda);border-radius:8px;padding:8px 12px;font-size:12.5px;line-height:1.6}
@media(max-width:920px){.anexo,.an-det{margin-left:0}}

/* criador de documentos */
.subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.subtabs button{border:1px solid var(--borda);background:#fff;border-radius:8px;padding:8px 16px;font-size:13.5px;color:var(--suave)}
.subtabs button.ativo{background:var(--ink);color:#fff;border-color:var(--ink)}
.passo-row{display:grid;grid-template-columns:26px 140px 1fr 170px 180px 84px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #E7EAF0}
.passo-row .pn{font-family:Georgia,serif;font-weight:700;color:var(--azul);text-align:center}
.svg-prev{border:1px solid var(--borda);border-radius:10px;background:#fff;padding:14px;overflow:auto}
.fx-card{display:flex;align-items:center;gap:12px}
.fx-card .fx-info{flex:1}
.fx-card .fx-info b{color:var(--ink)}
.fx-card .fx-info small{display:block;color:var(--suave)}
.norm-fed{font-size:13px;padding:7px 0;border-bottom:1px dashed #E7EAF0}
.norm-fed b{color:var(--ink)}
.norm-row{display:grid;grid-template-columns:150px 110px 80px 1fr 220px 36px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #E7EAF0}
@media(max-width:920px){.passo-row,.norm-row{grid-template-columns:1fr 1fr}}

/* consultoria */
.tl{position:relative;margin-left:14px;padding-left:22px;border-left:2px solid var(--borda)}
.tl-item{position:relative;padding:10px 0 12px}
.tl-item::before{content:'';position:absolute;left:-29px;top:14px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--azul)}
.tl-item.tipo-entrega::before{border-color:var(--verde)}
.tl-item.tipo-solic::before{border-color:var(--ambar)}
.tl-item.tipo-reuniao::before{border-color:var(--ink)}
.tl-item.tipo-pend::before{border-color:var(--vinho)}
.tl-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tl-head .data{font-family:Georgia,serif;color:var(--azul);font-weight:700;font-size:13.5px}
.tl-head .tit{font-weight:600;color:var(--ink);flex:1;min-width:160px}
.tl-desc{font-size:13px;color:var(--texto);margin-top:4px;white-space:pre-wrap}
.tl-meta{font-size:12px;color:var(--suave);margin-top:4px}
.ativ-form{display:grid;grid-template-columns:130px 150px 1fr 110px;gap:8px;align-items:end}
@media(max-width:920px){.ativ-form{grid-template-columns:1fr 1fr}}
.solic-row{display:grid;grid-template-columns:96px 1fr 150px 130px 140px 36px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px dashed #E7EAF0}
@media(max-width:920px){.solic-row{grid-template-columns:1fr 1fr}}
.mini-anexo{display:inline-flex;align-items:center;gap:6px;background:#F4F6FA;border:1px solid var(--borda);border-radius:6px;padding:2px 8px;font-size:11.5px;margin:3px 4px 0 0}

/* enquadramento de investimentos */
.enq-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1000px){.enq-grid{grid-template-columns:1fr}}
.seg-row{display:grid;grid-template-columns:1fr 130px 70px 90px 90px 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #E7EAF0;font-size:13px}
.seg-row.head{border-bottom:1px solid var(--borda);font-weight:600}
.seg-row .badge{font-size:11px}
@media(max-width:760px){.seg-row{grid-template-columns:1fr 1fr}}
.bar-enq{height:18px;border-radius:5px;background:var(--cinza-bg);position:relative;overflow:hidden}
.bar-enq i{position:absolute;left:0;top:0;height:100%;border-radius:5px}
.bar-enq .lim{position:absolute;top:-3px;width:2px;height:24px;background:#13294B}
.niv-cmp{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.niv-card{border:1px solid var(--borda);border-radius:10px;padding:12px;text-align:center}
.niv-card.atual{border-color:var(--ouro);border-width:2px;background:#FDFBF3}
.niv-card .pc{font-family:Georgia,serif;font-size:26px;color:var(--ink)}
.niv-card .lb{font-size:11.5px;color:var(--suave);text-transform:uppercase;letter-spacing:.04em}
.niv-card small{display:block;margin-top:4px;font-size:11px}
@media(max-width:760px){.niv-cmp{grid-template-columns:repeat(2,1fr)}}
.lim-edit-row{display:grid;grid-template-columns:1fr 70px 70px 70px 70px 70px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px dashed #E7EAF0;font-size:12.5px}
.lim-edit-row.head{font-weight:600;border-bottom:1px solid var(--borda)}
.lim-edit-row input{padding:4px 5px;text-align:center}
@media(max-width:760px){.lim-edit-row{grid-template-columns:1fr 1fr 1fr}}

/* ====== impressão ====== */
#printArea{display:none}
@media print{
  body > .app{display:none}
  #printArea{display:block;font-family:Georgia,"Times New Roman",serif;color:#111;font-size:12.5pt;line-height:1.5}
  #printArea h1{font-size:17pt;text-align:center;margin-bottom:2pt}
  #printArea h2{font-size:13.5pt;margin:14pt 0 6pt;border-bottom:1.5pt solid #13294B;color:#13294B;padding-bottom:2pt}
  #printArea h3{font-size:12pt;margin:10pt 0 4pt;color:#13294B}
  #printArea .doc-cab{text-align:center;border-bottom:2.5pt double #13294B;padding-bottom:8pt;margin-bottom:14pt}
  #printArea .doc-cab .orgao{font-size:10pt;text-transform:uppercase;letter-spacing:.06em}
  #printArea table{width:100%;border-collapse:collapse;font-size:10.5pt;margin:6pt 0}
  #printArea th,#printArea td{border:.75pt solid #555;padding:4pt 6pt;text-align:left;background:none!important;color:#111}
  #printArea th{background:#E8ECF4!important}
  #printArea p{margin:5pt 0;text-align:justify}
  #printArea ul,#printArea ol{margin:5pt 0 5pt 18pt}
  #printArea li{margin:2.5pt 0}
  #printArea .ass{margin-top:34pt;text-align:center}
  #printArea .ass .linha{border-top:.9pt solid #111;width:62%;margin:0 auto;padding-top:4pt}
  #printArea .pill-print{font-weight:bold}
  #printArea .quebra{page-break-before:always}
  @page{margin:2cm 1.8cm}
}
@media(max-width:920px){
  .app{flex-direction:column}
  aside{width:100%;height:auto;position:static}
  nav{display:flex;overflow-x:auto;padding:8px}
  nav button{width:auto;white-space:nowrap}
  .nav-verdict,.rodape-side{display:none}
  main{padding:18px 14px 50px}
  .req-item{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="selo-mini">PG</div>
      <h1>Pró-Gestão RPPS</h1>
      <small>Implantação · Nível II · v4.0/2026</small>
    </div>
    <nav id="navMenu"></nav>
    <div class="nav-verdict" id="navVerdict"></div>
    <div class="rodape-side">Base: Manual do Pró-Gestão RPPS — Versão 4.0 (Portaria SRPC nº 236, DOU 04/02/2026) · art. 236 da Portaria MTP nº 1.467/2022</div>
  </aside>
  <main id="conteudo"></main>
</div>
<div id="printArea"></div>
<script>
/* ================================================================
   BASE DE CONHECIMENTO — Requisitos do NÍVEL II por ação (Manual 4.0)
   ================================================================ */
const DIMS = {1:'Controles Internos', 2:'Governança Corporativa', 3:'Educação Previdenciária'};

const ACOES = [
/* ---------------- DIMENSÃO 1 — CONTROLES INTERNOS ---------------- */
{id:'1.1',dim:1,essencial:true,nome:'Mapeamento das Atividades das Áreas de Atuação do RPPS',
 resumo:'Nível II: mapear, no mínimo, 4 áreas obrigatórias — Benefícios, Arrecadação, Investimentos e Compensação Previdenciária — com visão sistêmica (item 3.1.1 do Manual).',
 req:[
  'Área de Benefícios mapeada: arrecadação mensal de contribuições, concessão e revisão de aposentadorias e pensões e gestão da folha de pagamento de benefícios',
  'Área de Arrecadação mapeada: cobrança de débitos de contribuições em atraso do ente federativo e dos servidores licenciados e cedidos',
  'Área de Investimentos mapeada: elaboração e aprovação da política de investimentos, credenciamento das instituições financeiras e alocação/desinvestimento dos recursos',
  'Área de Compensação Previdenciária mapeada: envio e análise de requerimentos de compensação previdenciária (Comprev)',
  'Mapas/fluxogramas elaborados com metodologia definida (ex.: BPMN), verificados, validados pelos responsáveis e formalmente aprovados'],
 docs:[
  'Fluxogramas / mapas de processos das 4 áreas obrigatórias',
  'Documento da metodologia de mapeamento adotada (notação, ferramenta, níveis de detalhamento)',
  'Ato ou registro de validação e aprovação dos mapas pelos responsáveis das áreas',
  'Classificação/hierarquia de processos do RPPS (modelo do Anexo 1 do Manual)']},

{id:'1.2',dim:1,essencial:true,nome:'Manualização das Atividades das Áreas de Atuação do RPPS',
 resumo:'Nível II: manualizar processos e atividades das mesmas 4 áreas obrigatórias, com procedimentos padronizados de execução, desempenho, qualidade e reprodutibilidade (item 3.1.2).',
 req:[
  'Manual de procedimentos da área de Benefícios aprovado (inclui folha de pagamento de benefícios)',
  'Manual de procedimentos da área de Arrecadação aprovado (cobrança de débitos em atraso, licenciados e cedidos)',
  'Manual de procedimentos da área de Investimentos aprovado (política, credenciamento, alocação/desinvestimento)',
  'Manual de procedimentos da área de Compensação Previdenciária aprovado',
  'Manuais divulgados internamente e servidores com conhecimento dos processos de trabalho objeto do ateste'],
 docs:[
  'Manuais de procedimentos das 4 áreas (com normas, padrões, prazos e responsáveis)',
  'Ato de aprovação/instituição dos manuais',
  'Comprovação de divulgação interna (e-mail, intranet, reunião com lista de presença)']},

{id:'1.3',dim:1,essencial:true,nome:'Certificação dos Dirigentes, Conselheiros, Gestor de Recursos e Comitê de Investimentos',
 resumo:'Regras uniformes para todos os níveis: certificação profissional vigente (art. 8º-B, II, da Lei nº 9.717/1998) — representante legal e maioria dos diretores; maioria dos titulares do CD e do CF; gestor de recursos; totalidade dos titulares do Comitê. Atendido também com a regularidade do critério no extrato previdenciário (item 3.1.3).',
 req:[
  'Representante legal da unidade gestora e maioria dos demais diretores com certificação vigente (nível conforme porte — Manual de Certificação dos Profissionais)',
  'Maioria dos membros titulares do Conselho Deliberativo com certificação vigente',
  'Maioria dos membros titulares do Conselho Fiscal com certificação vigente',
  'Responsável pela gestão das aplicações dos recursos com certificação vigente',
  'Totalidade dos membros titulares do Comitê de Investimentos com certificação vigente',
  'Alternativa/confirmação: critério correspondente regular no extrato previdenciário do RPPS (Cadprev)'],
 docs:[
  'Certificados profissionais vigentes de todos os obrigados (com validade na data da auditoria)',
  'Extrato previdenciário do RPPS com o critério de certificação regular',

{id:'1.4',dim:1,essencial:true,nome:'Estrutura de Controle Interno',

const CHAVE = 'progestao_n2_v1';
let S = {
  config:{rpps:'', ente:'', uf:'SP', resp:'', cargo:'', carteira50:'nao', art280:'nao', dataAlvo:''},
  req:{},      // status por requisito: 'pend'|'and'|'ok'|'nc'|'na'
  docs:{},     // status por documento: 'pend'|'sol'|'rec'|'val'

};

function salvar(){
  try{ localStorage.setItem(CHAVE, JSON.stringify(S)); }catch(e){ /* preview sem storage: usar Exportar backup */ }
}
function carregar(){
  try{
    const x = localStorage.getItem(CHAVE);
    if(x){ const o = JSON.parse(x); S = Object.assign(S, o); }
  }catch(e){}
  if(!S.plano){ S.plano = PLANO_PADRAO.map((p,i)=>({id:i+1,f:p.f,t:p.t,resp:'',ini:'',fim:'',st:'pend'})); }
  if(!S.anexos) S.anexos = {};
  Object.values(S.anexos).forEach(l=>l.forEach(f=>f.busy=false));
  if(!S.fluxos) S.fluxos=[];
  if(!S.docsCriados) S.docsCriados=[];
  if(!S.normasLocais) S.normasLocais=[];
  if(!S.criadorTab) S.criadorTab='fluxos';
  S.fluxoEdit=S.fluxoEdit||null; S.docEdit=S.docEdit||null;
  if(!S.atividades) S.atividades=[];
  if(!S.solicitacoes) S.solicitacoes=[];
  if(!S.consultoria) S.consultoria={empresa:'',cnpj:'',consultor:'',registro:'',contrato:'',objeto:'Implantação do Pró-Gestão RPPS — Nível II',inicio:'',fim:'',escopo:'',obs:''};
  if(!S.consTab) S.consTab='painel';
  S.novaAtiv=S.novaAtiv||null;
  if(!S.enq) S.enq={resolucao:'5272',nivelSugerido:2,itens:[],patrimonio:'',metaAtuarial:'',dataPos:''};
}
function exportar(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progestao_nivel2_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importar(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ S = Object.assign(S, JSON.parse(r.result)); salvar(); render(); alert('Backup importado com sucesso.'); }catch(e){ alert('Arquivo inválido.'); } };
  r.readAsText(f);
}

/* ================================================================
   CÁLCULO DE CONFORMIDADE
   ================================================================ */
function reqStatus(aid,i){ return S.req[aid+'-'+i] || 'pend'; }
function docStatus(aid,i){ return S.docs[aid+'-'+i] || 'pend'; }
function acaoDispensada(a){ return a.id==='2.7' && S.config.art280==='sim'; }

function statusAcao(a){
  if(acaoDispensada(a)) return 'disp';
  const sts = a.req.map((_,i)=>reqStatus(a.id,i));
  if(sts.some(s=>s==='nc')) return 'nao';
  const uteis = sts.filter(s=>s!=='na');
  if(uteis.length && uteis.every(s=>s==='ok')) return 'conforme';
  if(sts.some(s=>s==='ok'||s==='and')) return 'parcial';
  return 'pend';
}
function progAcao(a){
  if(acaoDispensada(a)) return 100;
  const sts = a.req.map((_,i)=>reqStatus(a.id,i)).filter(s=>s!=='na');
  if(!sts.length) return 0;
  return Math.round(100*sts.filter(s=>s==='ok').length/sts.length);
}
function resumoGeral(){
  let conf=0, ncs=[], pendEss=[], total=ACOES.length;
  ACOES.forEach(a=>{
    const st = statusAcao(a);
    if(st==='conforme'||st==='disp') conf++;
    else { ncs.push(a); if(a.essencial) pendEss.push(a.id); }
  });
  const essOk = pendEss.length===0;
  const aptoII = conf>=20 && essOk;
  const aptoI  = conf>=18 && essOk;
  let docsTot=0, docsOk=0;
  ACOES.forEach(a=>a.docs.forEach((_,i)=>{docsTot++; const d=docStatus(a.id,i); if(d==='val'||d==='rec')docsOk++;}));
  return {conf,total,essOk,pendEss,aptoII,aptoI,docsTot,docsOk};
}
const PILL = {conforme:['p-conforme','Conforme'],parcial:['p-parcial','Em andamento'],nao:['p-nao','Não conforme'],pend:['p-pend','Pendente'],disp:['p-disp','Dispensada (art. 280)']};
const PILL_DOC = {pend:'Pendente',sol:'Solicitado',rec:'Recebido',val:'Validado'};
function pill(st){ const p=PILL[st]; return '<span class="pill '+p[0]+'">'+p[1]+'</span>'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hoje(){ return new Date().toLocaleDateString('pt-BR'); }
function nomeRPPS(){ return S.config.rpps || '[Nome da Unidade Gestora do RPPS]'; }
function nomeEnte(){ return (S.config.ente||'[Município/Ente]') + (S.config.uf? ' - '+S.config.uf:''); }

const VERD_TXT = {forte:'indício forte de atendimento',parcial:'atendimento parcial — itens ausentes',nao:'não confirma o requisito',ilegivel:'texto não extraível (verificar manualmente)',erro:'análise não realizada'};
const STOP_TIT = new Set(['sobre','entre','todos','todas','ultimo','ultimos','ultimas','anexo','print','links','arquivo','exemplo','exemplos','amostra','demais','conforme','quando','houver','aplicavel','periodos','meses','ultimo','ainda','outros','outras','desse','dessa','deste','desta','pelos','pelas','seus','suas','para','manual']);

function norm(t){ return String(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function fmtKB(n){ return n>1048576? (n/1048576).toFixed(1)+' MB' : Math.max(1,Math.round(n/1024))+' KB'; }
function palavrasTitulo(t){
  return [...new Set(norm(t).split(/[^a-z0-9]+/).filter(w=>w.length>=5 && !STOP_TIT.has(w)))].slice(0,8);
}
function analisarTexto(aid, docTitulo, txt, ocr){
  const N = norm(txt);
  const chaves = ANALISE_CHAVES[aid]||[];
  const achados=[], ausentes=[];
  chaves.forEach(c=>{ (c.t.some(v=>N.includes(v)) ? achados : ausentes).push(c.l); });
  const tit = palavrasTitulo(docTitulo);
  const titOk = tit.filter(w=>N.includes(w));
  const anos = (N.match(/\b(19|20)\d{2}\b/g)||[]).map(Number).filter(y=>y>1995&&y<2100);
  const anoMax = anos.length? Math.max(...anos):null;
  const chars = N.replace(/\s+/g,' ').trim().length;
  let verd, score=0;
  if(chars<80) verd='ilegivel';
  else{
    const cr = chaves.length? achados.length/chaves.length : .5;
    const tr = tit.length? titOk.length/tit.length : .5;
    score = Math.round(100*(0.65*cr+0.35*tr));
    verd = score>=65?'forte': score>=35?'parcial':'nao';
  }
  return {verd,score,achados,ausentes,titOk:titOk.length,titTot:tit.length,anoMax,chars,ocr:!!ocr,data:hoje()};
}

/* --- IndexedDB: armazenamento local dos arquivos --- */
function dbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open('progestao_n2_files',1);
  r.onupgradeneeded=()=>{ r.result.createObjectStore('files',{keyPath:'id'}); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function dbPut(rec){ const db=await dbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put(rec); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function dbGet(id){ const db=await dbOpen(); return new Promise((res,rej)=>{ const q=db.transaction('files').objectStore('files').get(id); q.onsuccess=()=>res(q.result||null); q.onerror=()=>rej(q.error); }); }
async function dbDel(id){ const db=await dbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').delete(id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }

/* --- Bibliotecas de leitura (carregadas sob demanda; exigem internet na 1ª vez) --- */
function loadScript(src){ return new Promise((res,rej)=>{ const sc=document.createElement('script'); sc.src=src; sc.onload=res; sc.onerror=()=>rej(new Error('Sem acesso à internet para carregar a biblioteca de leitura ('+src.split('/').pop()+'). Conecte-se e tente novamente.')); document.head.appendChild(sc); }); }
async function libPDF(){ if(window.pdfjsLib) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
async function libOCR(){ if(window.Tesseract) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js'); }

async function extrairTexto(blob, nome){
  const ehPDF = /pdf/i.test(blob.type||'') || /\.pdf$/i.test(nome||'');
  if(ehPDF){
    await libPDF();
    const buf = await blob.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let txt='';
    const n = Math.min(pdf.numPages, 15);
    for(let p=1;p<=n;p++){
      const pg = await pdf.getPage(p);
      const tc = await pg.getTextContent();
      txt += tc.items.map(it=>it.str).join(' ')+'\n';
    }
    if(txt.replace(/\s+/g,'').length >= 120) return {txt, ocr:false};
    /* PDF digitalizado (imagem): OCR das primeiras páginas */
    await libOCR();
    let ocrTxt='';
    const np = Math.min(pdf.numPages, 3);
    for(let p=1;p<=np;p++){
      const pg = await pdf.getPage(p);
      const vp = pg.getViewport({scale:1.7});
      const cv = document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
      await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      const r = await Tesseract.recognize(cv,'por');
      ocrTxt += r.data.text+'\n';
    }
    return {txt:ocrTxt, ocr:true};
  }
  /* JPG/PNG: OCR direto */
  await libOCR();
  const url = URL.createObjectURL(blob);
  try{ const r = await Tesseract.recognize(url,'por'); return {txt:r.data.text, ocr:true}; }
  finally{ URL.revokeObjectURL(url); }
}

function verdBadge(f){
  if(f.busy) return '<span class="pill p-pend">Lendo/analisando…</span>';
  const an=f.an; if(!an) return '<span class="pill p-pend">Não analisado</span>';
  const m={forte:['p-conforme','Atende ('+an.score+'%)'],parcial:['p-parcial','Parcial ('+an.score+'%)'],nao:['p-nao','Não confirma'],ilegivel:['p-pend','Ilegível'],erro:['p-nao','Erro na análise']};
  const x=m[an.verd]||['p-pend','—'];
  return '<span class="pill '+x[0]+'">'+x[1]+'</span>';
}
function detalheAnalise(an){
  if(an.verd==='erro') return '<div class="an-det"><b>Análise não realizada:</b> '+esc(an.msg||'erro desconhecido')+'</div>';
  if(an.verd==='ilegivel') return '<div class="an-det">Não foi possível extrair texto legível ('+an.chars+' caracteres'+(an.ocr?', mesmo com OCR':'')+'). Melhore a qualidade da digitalização ou valide manualmente.</div>';
  return '<div class="an-det"><b>Leitura automática — '+an.score+'% de aderência'+(an.ocr?' (via OCR)':'')+' · '+an.data+':</b> '
   +(an.achados.length? 'elementos exigidos encontrados: <span style="color:var(--verde)">'+an.achados.map(esc).join('; ')+'</span>. ':'')
   +(an.ausentes.length? 'Não localizados no documento: <span style="color:var(--vinho)">'+an.ausentes.map(esc).join('; ')+'</span>. ':'')
   +(an.anoMax? 'Data mais recente identificada: <b>'+an.anoMax+'</b>'+(an.anoMax < new Date().getFullYear()-1 ? ' <span style="color:var(--ambar)">(verificar vigência/atualidade)</span>':'')+'. ':'')
   +'<i style="color:var(--suave)">Verificação heurística de conteúdo — apoia, mas não substitui, a conferência humana nem a auditoria da entidade certificadora.</i></div>';
}
function blocoAnexos(aid,i){
  const lst = S.anexos[aid+'-'+i]||[];
  return lst.map(f=>'<div class="anexo"><span class="nome" title="'+esc(f.name)+'">'+esc(f.name)+'</span><span style="color:var(--suave)">'+fmtKB(f.size)+'</span>'+verdBadge(f)
    +'<button class="btn mini" onclick="verAnexo(\''+f.id+'\')">Abrir</button>'
    +'<button class="btn mini" '+(f.busy?'disabled':'')+' onclick="reanalisar(\''+aid+'-'+i+'\',\''+f.id+'\')">'+(f.an?'Reanalisar':'Analisar')+'</button>'
    +'<button class="btn mini" onclick="removerAnexo(\''+aid+'-'+i+'\',\''+f.id+'\')">&#10005;</button></div>'
    +(f.an && !f.busy? detalheAnalise(f.an):'' )).join('');
}
function resumoAnexosCell(aid,i){
  const lst = S.anexos[aid+'-'+i]||[];
  const btn = '<button class="btn mini" title="Anexar PDF/JPG" onclick="anexarDoc(\''+aid+'\','+i+')">&#128206;</button>';
  if(!lst.length) return btn+' <span style="color:var(--suave)">sem anexos</span>';
  return btn+' '+lst.map(verdBadge).join(' ');
}
function anexarDoc(aid,i){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,.jpg,.jpeg,.png'; inp.multiple=true;
  inp.onchange=async ()=>{
    const key=aid+'-'+i;
    for(const file of inp.files){
      if(file.size>20*1024*1024){ alert('Arquivo acima de 20 MB ignorado: '+file.name); continue; }
      const id=key+'-'+Date.now()+'-'+Math.floor(Math.random()*1e4);
      try{ await dbPut({id, blob:file, name:file.name, type:file.type}); }
      catch(e){ alert('Não foi possível armazenar o anexo neste navegador: '+e); continue; }
      (S.anexos[key]=S.anexos[key]||[]).push({id,name:file.name,size:file.size,type:file.type,data:hoje()});
      if(['pend','sol'].includes(docStatus(aid,i))) S.docs[key]='rec';
    }
    salvar(); atualizarLeve();
    for(const f of (S.anexos[key]||[]).filter(x=>!x.an)) await executarAnalise(key,f.id);
  };
  inp.click();
}
async function executarAnalise(key,id){
  const f=(S.anexos[key]||[]).find(x=>x.id===id); if(!f||f.busy) return;
  f.busy=true; atualizarLeve();
  try{
    const rec=await dbGet(id);
    if(!rec||!rec.blob) throw new Error('o arquivo físico não está neste navegador — os anexos ficam no computador onde foram enviados (o backup JSON leva apenas os metadados e a análise).');
    const aid=key.slice(0,key.lastIndexOf('-')), di=+key.slice(key.lastIndexOf('-')+1);
    const acao=ACOES.find(a=>a.id===aid);
    const {txt,ocr}=await extrairTexto(rec.blob, rec.name||f.name);
    f.an=analisarTexto(aid, acao? acao.docs[di]:'', txt, ocr);
    if(f.an.verd==='forte') S.docs[key]='val';
  }catch(e){ f.an={verd:'erro',msg:String(e&&e.message||e),score:0,achados:[],ausentes:[],chars:0,data:hoje()}; }
  f.busy=false; salvar(); atualizarLeve();
}
function reanalisar(key,id){ const f=(S.anexos[key]||[]).find(x=>x.id===id); if(f) delete f.an; executarAnalise(key,id); }
async function verAnexo(id){
  try{ const rec=await dbGet(id);
    if(!rec){ alert('Arquivo não encontrado neste navegador. Os anexos ficam armazenados localmente (IndexedDB) no computador em que foram enviados.'); return; }
    window.open(URL.createObjectURL(rec.blob),'_blank');
  }catch(e){ alert('Erro ao abrir o anexo: '+e); }
}
async function removerAnexo(key,id){
  if(!confirm('Remover este anexo?')) return;
  try{ await dbDel(id); }catch(e){}
  S.anexos[key]=(S.anexos[key]||[]).filter(x=>x.id!==id);
  salvar(); atualizarLeve();
}
function anexosPrint(a){
  const li=[];
  a.docs.forEach((d,i)=>{(S.anexos[a.id+'-'+i]||[]).forEach(f=>{
    li.push('<li>'+esc(d)+' — <i>'+esc(f.name)+'</i>: '+(f.an? (VERD_TXT[f.an.verd]||'—')+(f.an.score?' ('+f.an.score+'%)':''):'anexado, não analisado')+'</li>'); });});
  return li.length? '<p><b>Evidências anexadas e leitura automática:</b></p><ul>'+li.join('')+'</ul>' : '';
}

/* ---------------- PRÉ-AUDITORIA ---------------- */
function vPre(el){
  const R = resumoGeral();
  const linhas = ACOES.map(a=>{
    const st=statusAcao(a), m=S.meta[a.id]||{};
    const pendReq = a.req.filter((_,i)=>!['ok','na'].includes(reqStatus(a.id,i))).length;
    const pendDoc = a.docs.filter((_,i)=>!['rec','val'].includes(docStatus(a.id,i))).length;
    return `<tr><td><b>${a.id}</b></td><td>${esc(a.nome)}</td><td>${a.essencial?'<span class="pill p-ess">Essencial</span>':'—'}</td><td>${pill(st)}</td><td>${acaoDispensada(a)?'—':pendReq+' req. · '+pendDoc+' doc.'}</td><td>${esc(m.resp)||'—'}</td></tr>`;
  }).join('');
  el.innerHTML = `
  <div class="topo"><div><h2>Pré-Auditoria de Conformidade</h2><div class="sub">Simulação do resultado da auditoria de certificação com base na autoavaliação registrada nas 24 ações. A regra do Manual (item 2.2.3): a certificação é determinada pelo nível mais simples atingido — para o Nível II, no mínimo <b>20 ações</b> conformes e <b>todas as 13 essenciais</b> atendidas.</div></div>
  <div class="acoes-topo"><button class="btn ouro" onclick="imprimirPreAuditoria()">Emitir Relatório de Pré-Auditoria</button></div></div>

  <div class="verdict ${R.aptoII?'ok':'nao'}" style="margin-bottom:14px">
    <h3>${R.aptoII?'PARECER PRELIMINAR: APTO — o RPPS reúne condições para a auditoria de certificação no Nível II':'PARECER PRELIMINAR: NÃO APTO — há pendências impeditivas para o Nível II'}</h3>
    <p>Ações conformes: <b>${R.conf}/24</b> (mínimo 20) · Essenciais atendidas: <b>${13-R.pendEss.length}/13</b>${R.pendEss.length?' — pendentes: <b>'+R.pendEss.join(', ')+'</b>':''} · Evidências recebidas/validadas: ${R.docsOk}/${R.docsTot}.
    ${!R.aptoII&&R.aptoI?' <br>Situação atual já atenderia ao <b>Nível I</b> (≥ 18 ações + essenciais).':''}</p>
  </div>

  <div class="card"><h3 class="serif" style="color:var(--ink);font-size:16px;margin-bottom:8px">Quadro geral por ação</h3>
  <table><tr><th style="width:50px">Ação</th><th>Nome</th><th style="width:95px">Tipo</th><th style="width:130px">Situação</th><th style="width:130px">Pendências</th><th style="width:140px">Responsável</th></tr>${linhas}</table></div>

  <div class="card"><h3 class="serif" style="color:var(--ink);font-size:16px;margin-bottom:8px">Recomendações para a auditoria real</h3>
  <ul style="margin-left:18px;font-size:13.5px;line-height:1.8">
   <li>Contratar entidade certificadora <b>credenciada pelo MPS</b> com antecedência; para renovação, iniciar com no mínimo <b>90 dias</b> antes do vencimento (item 2.3.2).</li>
   <li>Auditoria de certificação do Nível II exige tempo mínimo <b>presencial de 2 dias</b> (1 dia se houver pré-auditoria contratada em renovação/mudança de nível, com o mesmo auditor).</li>
   <li>Prever no Termo de Referência a <b>auditoria de supervisão</b> obrigatória nos 2 anos seguintes (Níveis I e II: documental/remota, focada nas 13 ações essenciais).</li>
   <li>Os servidores responsáveis devem <b>conhecer os processos</b> objeto do ateste — o auditor verificará por indagações e reexecução.</li>
   <li>Manter o dossiê de evidências em meio digital organizado por ação (guarda mínima de 3 anos).</li>
   <li>Em caso de inconformidade apontada, o representante legal tem <b>15 dias corridos</b> do término da auditoria para recurso à Comissão do Pró-Gestão (item 2.4.3).</li>
  </ul></div>`;
}

/* --- Relatório de Pré-Auditoria (impressão) --- */
function imprimirPreAuditoria(){
  const R = resumoGeral();
  const stTxt={conforme:'CONFORME',parcial:'EM ANDAMENTO',nao:'NÃO CONFORME',pend:'PENDENTE',disp:'DISPENSADA (art. 280)'};
  const blocos = [1,2,3].map(d=>{
    return `<h2>Dimensão ${d} — ${DIMS[d]}</h2>` + ACOES.filter(a=>a.dim===d).map(a=>{
      const st=statusAcao(a), m=S.meta[a.id]||{};
      const reqPend = a.req.map((r,i)=>({r,s:reqStatus(a.id,i)})).filter(x=>!['ok','na'].includes(x.s));
      const docPend = a.docs.map((dx,i)=>({d:dx,s:docStatus(a.id,i)})).filter(x=>!['rec','val'].includes(x.s));
      return `<h3>Ação ${a.id} — ${esc(a.nome)} ${a.essencial?'· AÇÃO ESSENCIAL':''}</h3>
      <p><b>Resultado da pré-auditoria:</b> <span class="pill-print">${stTxt[st]}</span> (${progAcao(a)}% dos requisitos conformes)</p>
      ${reqPend.length&&st!=='disp'? '<p><b>Requisitos pendentes/não conformes:</b></p><ul>'+reqPend.map(x=>'<li>'+esc(x.r)+' <i>('+({pend:'pendente',and:'em andamento',nc:'não conforme'})[x.s]+')</i></li>').join('')+'</ul>':''}
      ${docPend.length? '<p><b>Evidências documentais a completar:</b></p><ul>'+docPend.map(x=>'<li>'+esc(x.d)+'</li>').join('')+'</ul>':''}
      ${anexosPrint(a)}
      ${m.obs? '<p><b>Constatações do avaliador:</b> '+esc(m.obs)+'</p>':''}
      ${m.resp||m.prazo? '<p><b>Responsável:</b> '+esc(m.resp||'—')+(m.prazo?' · <b>Prazo:</b> '+new Date(m.prazo+'T12:00').toLocaleDateString('pt-BR'):'')+'</p>':''}`;
    }).join('');
  }).join('');
  imprimirHTML(cabecalhoDoc('RELATÓRIO DE PRÉ-AUDITORIA DE CONFORMIDADE — PRÓ-GESTÃO RPPS','Nível de aderência pretendido: II · Manual v4.0 · Emitido em '+hoje())+`
  <h2>1. Parecer preliminar</h2>
  <p style="font-size:13pt"><b>${R.aptoII?'APTO':'NÃO APTO'}</b> — Com base na autoavaliação dos processos de trabalho, ${R.aptoII
    ? 'o RPPS demonstra conformidade suficiente para se submeter à auditoria de certificação no Nível II: foram atendidas '+R.conf+' das 24 ações (mínimo exigido: 20), incluindo a totalidade das 13 ações essenciais.'
    : 'o RPPS ainda não reúne as condições mínimas para a certificação no Nível II. Situação atual: '+R.conf+' de 24 ações conformes (mínimo: 20)'+(R.pendEss.length? '; ações essenciais pendentes: '+R.pendEss.join(', ')+' — o não atendimento de qualquer ação essencial impede a certificação em qualquer nível.':'.')}
  ${!R.aptoII&&R.aptoI?' Observa-se que a situação atual já atenderia aos critérios quantitativos do Nível I (mínimo de 18 ações, com as essenciais).':''}</p>
  <table><tr><th>Critério</th><th>Exigido (Nível II)</th><th>Apurado</th><th>Atende?</th></tr>
  <tr><td>Ações conformes</td><td>≥ 20 de 24</td><td>${R.conf}</td><td>${R.conf>=20?'Sim':'Não'}</td></tr>
  <tr><td>Ações essenciais atendidas</td><td>13 de 13</td><td>${13-R.pendEss.length}</td><td>${R.essOk?'Sim':'Não'}</td></tr>
  <tr><td>Evidências documentais recebidas/validadas</td><td>Dossiê completo</td><td>${R.docsOk} de ${R.docsTot}</td><td>${R.docsOk===R.docsTot?'Sim':'Parcial'}</td></tr></table>
  <p><b>Unidade gestora:</b> ${esc(nomeRPPS())} · <b>Ente:</b> ${esc(nomeEnte())} · <b>Coordenador do Pró-Gestão:</b> ${esc(S.config.resp||'—')}${S.config.dataAlvo? ' · <b>Auditoria prevista:</b> '+new Date(S.config.dataAlvo+'T12:00').toLocaleDateString('pt-BR'):''}</p>
  <div class="quebra"></div>
  ${blocos}
  <h2>Encaminhamentos</h2>
  <p>As não conformidades e pendências relacionadas neste relatório deverão ser saneadas antes da contratação da auditoria de certificação, com registro das ações corretivas e atualização do dossiê de evidências. Após a certificação, o RPPS deverá manter procedimentos periódicos de autoavaliação (item 2.2.3) e submeter-se à auditoria de supervisão nos 2 anos seguintes (item 2.3.2).</p>
  ${assinaturas([[S.config.resp||'COORDENADOR DO PRÓ-GESTÃO',S.config.cargo||''],['REPRESENTANTE LEGAL DA UNIDADE GESTORA','']])}`);
}

function baseNormativaHTML(area){
 const ids=['cf40','l9717','p1467','manual'].concat(AREA_NORMAS[area]||[]);
 const fed=[...new Set(ids)].map(id=>NORMAS_FED.find(n=>n.id===id)).filter(Boolean);
 const na=norm(area||'');
 const locais=(S.normasLocais||[]).filter(n=>{
   const t=norm(n.areas||'').trim(); if(!t) return true;
   return t.split(',').map(x=>x.trim()).filter(Boolean).some(x=> x===na || na.includes(x) || x.includes(na));
 });
 return '<ul>'+fed.map(n=>'<li><b>'+esc(n.ref)+'</b> — '+esc(n.desc)+'</li>').join('')
  + locais.map(n=>'<li><b>'+esc((n.tipo||'Norma')+' nº '+(n.numero||'__')+'/'+(n.ano||'____'))+'</b> — '+esc(n.ementa||'')+' <i>(norma do Ente)</i></li>').join('')
  +'</ul>';
}

const TIPOS_PASSO=[['inicio','Início'],['atv','Atividade'],['dec','Decisão'],['doc','Documento/Registro'],['fim','Fim']];
function tipoPassoNome(tp){ const x=TIPOS_PASSO.find(t=>t[0]===tp); return x?x[1]:tp; }
function wrapTxt(t,max){ const ws=String(t||'').split(/\s+/).filter(Boolean); const ls=[]; let cur='';
 ws.forEach(w=>{ if((cur+' '+w).trim().length>max){ if(cur)ls.push(cur); cur=w; } else cur=(cur?cur+' ':'')+w; });
 if(cur)ls.push(cur); return ls.length?ls.slice(0,4):[''];
}
function svgFluxo(fl){
 const passos=fl.passos||[];
 if(!passos.length) return '<svg viewBox="0 0 760 80" xmlns="http://www.w3.org/2000/svg"><text x="380" y="45" text-anchor="middle" fill="#69748A" font-size="14">Adicione passos para visualizar o fluxograma</text></svg>';
 const W=780, cx=310, nw=330, sideX=520, sw=230;
 const pos=[]; let y=16;
 passos.forEach(p=>{
   const lines=wrapTxt(p.txt,44); let h;
   if(p.tp==='inicio'||p.tp==='fim') h=38+(lines.length-1)*14;
   else if(p.tp==='dec') h=72+(lines.length-1)*15;
   else h=26+lines.length*15+(p.resp?15:0);
   pos.push({y,h}); y+=h+46;
 });
 const H=y+6; let out='';
 passos.forEach((p,idx)=>{
   const {y:py,h}=pos[idx]; const lines=wrapTxt(p.txt,44);
   if(p.tp==='inicio'||p.tp==='fim'){
     out+='<rect x="'+(cx-135)+'" y="'+py+'" rx="'+(h/2)+'" width="270" height="'+h+'" fill="#13294B"/>';
     lines.forEach((ln,i)=> out+='<text x="'+cx+'" y="'+(py+h/2+(i-(lines.length-1)/2)*14+4)+'" text-anchor="middle" fill="#FFFFFF" font-size="12.5" font-weight="600">'+esc(ln)+'</text>');
   } else if(p.tp==='dec'){
     out+='<polygon points="'+cx+','+py+' '+(cx+nw/2)+','+(py+h/2)+' '+cx+','+(py+h)+' '+(cx-nw/2)+','+(py+h/2)+'" fill="#FBF3DF" stroke="#C9A227" stroke-width="1.6"/>';
     lines.forEach((ln,i)=> out+='<text x="'+cx+'" y="'+(py+h/2+(i-(lines.length-1)/2)*13+4)+'" text-anchor="middle" fill="#6B4F12" font-size="11.5" font-weight="600">'+esc(ln)+'</text>');
     if(p.nao){
       const nl=wrapTxt(p.nao,34); const bh=16+nl.length*13;
       out+='<line x1="'+(cx+nw/2)+'" y1="'+(py+h/2)+'" x2="'+sideX+'" y2="'+(py+h/2)+'" stroke="#A63D40" stroke-width="1.4" marker-end="url(#setaR)"/>';
       out+='<text x="'+(cx+nw/2+12)+'" y="'+(py+h/2-7)+'" fill="#A63D40" font-size="11" font-weight="700">N&#195;O</text>';
       out+='<rect x="'+sideX+'" y="'+(py+h/2-bh/2)+'" width="'+sw+'" height="'+bh+'" rx="6" fill="#F9E9E9" stroke="#A63D40" stroke-dasharray="4 3"/>';
       nl.forEach((ln,i)=> out+='<text x="'+(sideX+sw/2)+'" y="'+(py+h/2-bh/2+14+i*13)+'" text-anchor="middle" fill="#7A2D2F" font-size="10.5">'+esc(ln)+'</text>');
       if(idx<passos.length-1){ const ny=pos[idx+1].y;
         out+='<path d="M '+(sideX+sw/2)+' '+(py+h/2+bh/2)+' V '+(ny-20)+' H '+cx+'" fill="none" stroke="#A63D40" stroke-width="1.1" stroke-dasharray="4 3"/>'; }
     }
   } else {
     const fill=p.tp==='doc'?'#E8F3ED':'#EAF0F9', strk=p.tp==='doc'?'#2E7D52':'#1B4B8F';
     out+='<rect x="'+(cx-nw/2)+'" y="'+py+'" width="'+nw+'" height="'+h+'" rx="7" fill="'+fill+'" stroke="'+strk+'" stroke-width="1.5"/>';
     if(p.tp==='doc') out+='<path d="M '+(cx+nw/2-22)+' '+py+' v 13 h 13" fill="none" stroke="'+strk+'" stroke-width="1.2"/>';
     lines.forEach((ln,i)=> out+='<text x="'+cx+'" y="'+(py+18+i*15)+'" text-anchor="middle" fill="#1D2940" font-size="12">'+esc(ln)+'</text>');
     if(p.resp) out+='<text x="'+cx+'" y="'+(py+h-8)+'" text-anchor="middle" fill="#69748A" font-size="10.5" font-style="italic">Resp.: '+esc(p.resp)+'</text>';
   }
   out+='<circle cx="'+(cx-nw/2-26)+'" cy="'+(py+h/2)+'" r="11" fill="#FFFFFF" stroke="#13294B"/><text x="'+(cx-nw/2-26)+'" y="'+(py+h/2+4)+'" text-anchor="middle" font-size="10.5" fill="#13294B" font-weight="700">'+(idx+1)+'</text>';
   if(idx<passos.length-1){
     const y1=py+h, y2=pos[idx+1].y;
     out+='<line x1="'+cx+'" y1="'+y1+'" x2="'+cx+'" y2="'+(y2-2)+'" stroke="#13294B" stroke-width="1.6" marker-end="url(#seta)"/>';
     if(p.tp==='dec') out+='<text x="'+(cx+9)+'" y="'+((y1+y2)/2+3)+'" fill="#2E7D52" font-size="11" font-weight="700">SIM</text>';
   }
 });
 return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+W+'px;background:#fff">'
  +'<defs><marker id="seta" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#13294B"/></marker>'
  +'<marker id="setaR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#A63D40"/></marker></defs>'+out+'</svg>';
}

function novoFluxo(){
 const sel=document.getElementById('selTplFluxo'); const i=sel? +sel.value : -1;
 const id='fx'+Date.now();
 const base= i>=0? JSON.parse(JSON.stringify(FLUXO_TPL[i])) : {titulo:'Novo processo',area:'Benefícios',acao:'1.1',objetivo:'',passos:[{tp:'inicio',txt:'Evento que inicia o processo'},{tp:'atv',txt:'Primeira atividade',resp:''},{tp:'fim',txt:'Resultado final do processo'}]};
 S.fluxos.push(Object.assign({id,criado:hoje(),atualizado:hoje()},base));
 S.fluxoEdit=id; salvar(); render();
}
function dupFluxo(id){ const f=S.fluxos.find(x=>x.id===id); if(!f)return; const c=JSON.parse(JSON.stringify(f)); c.id='fx'+Date.now(); c.titulo=f.titulo+' (cópia)'; c.criado=hoje(); S.fluxos.push(c); salvar(); render(); }
function delFluxo(id){ if(!confirm('Excluir este fluxograma?'))return; S.fluxos=S.fluxos.filter(f=>f.id!==id); salvar(); render(); }
function fxAtual(){ return S.fluxos.find(f=>f.id===S.fluxoEdit); }
function updFx(k,v){ const f=fxAtual(); if(!f)return; f[k]=v; f.atualizado=hoje(); salvar(); if(k==='area'||k==='acao')render(); }
function addPasso(){ const f=fxAtual(); f.passos.push({tp:'atv',txt:'',resp:''}); f.atualizado=hoje(); salvar(); render(); }
function updPasso(i,k,v){ const f=fxAtual(); if(!f||!f.passos[i])return; f.passos[i][k]=v; f.atualizado=hoje(); salvar(); const pv=document.getElementById('prevFluxo'); if(pv) pv.innerHTML=svgFluxo(f); if(k==='tp') render(); }
function movPasso(i,d){ const f=fxAtual(); const j=i+d; if(j<0||j>=f.passos.length)return; const t=f.passos[i]; f.passos[i]=f.passos[j]; f.passos[j]=t; salvar(); render(); }
function delPasso(i){ const f=fxAtual(); f.passos.splice(i,1); salvar(); render(); }
function registrarEvid(key,label){ if(S.docs[key]!=='val') S.docs[key]='rec'; salvar(); alert('Evidência da '+label+' marcada como "Recebido" no checklist de documentos.'); render(); }

function tituloDocCriado(d){ const c=d.campos||{};

}

 };

/* ---------- anexo genérico (reutiliza IndexedDB e análise) ---------- */
function anexarGenerico(key){
 const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx'; inp.multiple=true;
 inp.onchange=async ()=>{
   for(const file of inp.files){
     if(file.size>20*1024*1024){ alert('Arquivo acima de 20 MB ignorado: '+file.name); continue; }
     const id=key+'-'+Date.now()+'-'+Math.floor(Math.random()*1e4);
     try{ await dbPut({id,blob:file,name:file.name,type:file.type}); }catch(e){ alert('Falha ao armazenar: '+e); continue; }
     (S.anexos[key]=S.anexos[key]||[]).push({id,name:file.name,size:file.size,type:file.type,data:hoje()});
   }
   salvar(); render();
 };
 inp.click();
}

  +'<div style="color:var(--suave);font-size:12.5px">Soma dos itens: <b>R$ '+fmtBRL(somaItens())+'</b>'+(E.patrimonio&&Math.abs(parseFloat(E.patrimonio)-somaItens())>1?' · <span style="color:var(--ambar)">difere da soma informada</span>':'')+'</div></div></div>'

  // painel autoritativo do DAIR (preenchido pela leitura automática)

/* cálculo de enquadramento para um nível */
function calcEnq(nivelIdx){
 const pt=patrim(); const L=S.enq.limites;
 const porSeg={}; L.forEach(l=>porSeg[l.cod]={seg:l.seg,lim:l.lim[nivelIdx],valor:0});
 (S.enq.itens||[]).forEach(it=>{ if(porSeg[it.cod]) porSeg[it.cod].valor+=parseFloat(it.valor)||0; });
 let enqVal=0, excVal=0; const linhas=[];
 Object.values(porSeg).forEach(s=>{
  const pc=pt>0?100*s.valor/pt:0;
  const dentro = pc<=s.lim+1e-9;
  const excPc = dentro?0:pc-s.lim;
  const excV = dentro?0:s.valor-(s.lim/100*pt);
  if(s.valor>0){ if(dentro) enqVal+=s.valor; else { enqVal+=(s.lim/100*pt); excVal+=excV; } }
  if(s.valor>0||s.lim>0) linhas.push({seg:s.seg,valor:s.valor,pc,lim:s.lim,dentro,excPc,excV});
 });
 const pctEnq = pt>0?100*enqVal/pt:0;
 return {pt,linhas,enqVal,excVal,pctEnq};
}

/* limites GLOBAIS por nível (somatórios de subclasses — arts. 7º §7, 8º, 10, 14) */
function calcGlobais(nivelIdx){
 const pt=patrim(); if(pt<=0) return [];
 const porCod={}; (S.enq.itens||[]).forEach(it=>{ porCod[it.cod]=(porCod[it.cod]||0)+(parseFloat(it.valor)||0); });
 return limitesGlobais(S.enq.resolucao).map(g=>{
  const v=g.cods.reduce((s,c)=>s+(porCod[c]||0),0);
  const pc=pt>0?100*v/pt:0, lim=g.lim[nivelIdx], dentro=pc<=lim+1e-9;
  return {nome:g.nome,valor:v,pc,lim,dentro,excV:dentro?0:v-(lim/100*pt)};
 }).filter(g=>g.valor>0);
}

/* ===== Parser POSICIONAL do DAIR ===== */
/* ===== Parser POSICIONAL do DAIR (carteira/enquadramento) — validado ===== */
// Limites por subclasse (Res. CMN — EDITÁVEIS no sistema; aqui só p/ alerta).
var LIMITES_CMN = {
  'Art. 7, I': 100, 'Art. 7, II': 100, 'Art. 7, III': 60, 'Art. 7, IV': 20,
  'Art. 7, V': 80, 'Art. 7, VI': 20, 'Art. 7, VII': 5,
  'Art. 8, I': 40, 'Art. 8, II': 40, 'Art. 8, III': 10, 'Art. 8, IV': 10,
  'Art. 9, I': 15, 'Art. 9, II': 15,
  'Art. 10, I': 15, 'Art. 10, II': 15, 'Art. 10, III': 10,
  'Art. 11, I': 10
};
var ART_SEGMENTO = {
  '7': 'Renda Fixa', '8': 'Renda Variável', '9': 'Imobiliário',
  '10': 'Investimentos Estruturados', '11': 'Investimentos no Exterior'
};

function numBR(s) {
  // "R$ 16.919.644,1100000000" -> 16919644.11 ; "2,77" -> 2.77 ; ignora não-numéricos
  s = String(s).replace(/R\$/g, '').trim();
  if (!/^[\d.,]+$/.test(s) || s === '') return null;
  var v = parseFloat(s.replace(/\./g, '').replace(',', '.'));
  return isFinite(v) ? v : null;
}

// Agrupa números 1-D em clusters quando o "gap" entre vizinhos é grande.
function cluster1d(vals, minGap) {
  vals = vals.slice().sort(function (a, b) { return a - b; });
  var groups = [], cur = [];
  for (var i = 0; i < vals.length; i++) {
    if (cur.length && (vals[i] - cur[cur.length - 1]) > minGap) { groups.push(cur); cur = []; }
    cur.push(vals[i]);
  }
  if (cur.length) groups.push(cur);
  return groups.map(function (g) {
    return { min: g[0], max: g[g.length - 1], center: g.reduce(function (a, b) { return a + b; }, 0) / g.length, n: g.length };
  });
}

function parseDAIRCarteira(items, opts) {
  opts = opts || {};
  var Y_TOL = opts.yTol || 2.2;        // tolerância vertical p/ "mesma linha"
  var VAL_X_MIN = opts.valXMin || 600; // valores da carteira ficam à direita
  var out = { ok: false, conferido: false, totalOficial: null,
              baseLimites: 0, totalGeral: 0, disponibilidades: 0,
              porSubclasse: {}, ativos: [], avisos: [] };

  if (!items || !items.length) { out.avisos.push('Sem itens de texto.'); return out; }

  // O `y` do pdf.js é relativo a cada página. Ao concatenar várias páginas,
  // normalizamos com um offset por página para o ordenamento NÃO embaralhar
  // ativos de páginas diferentes. (Se já vier por página, page=0 não muda nada.)
  items = items.map(function (it) {
    return { str: it.str, x: it.x, w: it.w || 0, y: (it.page || 0) * 1e6 + it.y };
  });

  // Apenas itens da área de valores (numéricos OU "R$"), à direita da página.
  var val = items.filter(function (it) {
    var right = it.x + (it.w || 0);
    if (right < VAL_X_MIN) return false;
    return it.str === 'R$' || numBR(it.str) !== null;
  });
  if (val.length < 6) { out.avisos.push('Área de valores não localizada.'); return out; }

  // Mescla "R$" + número numa mesma "célula" (pdf.js às vezes separa, às vezes não).
  var cells = [];
  var nums = val.filter(function (it) { return numBR(it.str) !== null; });
  var rss = val.filter(function (it) { return it.str === 'R$'; });
  nums.forEach(function (n) {
    var hasRS = /R\$/.test(n.str) || rss.some(function (r) {
      return Math.abs(r.y - n.y) <= Y_TOL && r.x < n.x && (n.x - (r.x + (r.w || 0))) < 14;
    });
    cells.push({ y: n.y, right: n.x + (n.w || 0), val: numBR(n.str), rs: hasRS });
  });

  // Detecta as duas colunas de valor (COL_A = qtd/cota/total ; COL_B = %/PL) pela
  // borda direita. COL_A é a de MENOR x; COL_B a de MAIOR x.
  var clusters = cluster1d(cells.map(function (c) { return c.right; }), 25);
  if (!clusters.length) { out.avisos.push('Colunas de valor não detectadas.'); return out; }
  clusters.sort(function (a, b) { return b.n - a.n; });          // pega as 2 mais densas
  var top2 = clusters.slice(0, 2).sort(function (a, b) { return a.center - b.center; });
  var colA = top2[0];
  var inColA = function (c) { return Math.abs(c.right - colA.center) <= 14; };

  var colACells = cells.filter(inColA).sort(function (a, b) { return a.y - b.y; });

  // Cada QUANTIDADE (valor da COL_A SEM R$) inicia um novo ativo.
  var qtys = colACells.filter(function (c) { return !c.rs; });
  if (!qtys.length) { out.avisos.push('Quantidades (linha-base de ativo) não encontradas.'); return out; }

  var arts = items.filter(function (it) { return /^Art\.?$/.test(it.str); });

  for (var i = 0; i < qtys.length; i++) {
    var lo = qtys[i].y;
    var hi = (i + 1 < qtys.length) ? qtys[i + 1].y : Infinity;
    // VALOR TOTAL = último R$ da COL_A dentro do intervalo do ativo
    var rsHere = colACells.filter(function (c) { return c.rs && c.y > lo && c.y < hi; });
    var total = rsHere.length ? rsHere[rsHere.length - 1].val : 0;

    // Subclasse + limite OFICIAL declarado no próprio DAIR
    var sub = null, subLim = null;
    for (var a = 0; a < arts.length; a++) {
      if (arts[a].y >= lo - Y_TOL && arts[a].y < hi) {
        var lineStr = items.filter(function (it) {
          return Math.abs(it.y - arts[a].y) <= Y_TOL && it.x >= arts[a].x;
        }).sort(function (p, q) { return p.x - q.x; }).map(function (it) { return it.str; }).join(' ');
        var m = lineStr.match(/Art\.?\s*(\d+)[°ºo]?(?:\s*,?\s*([IVX]+))?/);
        if (m) {
          sub = 'Art. ' + m[1] + (m[2] ? ', ' + m[2] : '');
          // limite OFICIAL: coluna "LIMITE DA RESOLUÇÃO CMN %" (x0~202), linha mais
          // próxima do "Art." (em alguns tipos o limite fica 1 sub-linha acima).
          var best = null, bestd = 7;
          for (var z = 0; z < items.length; z++) {
            var it2 = items[z];
            if (it2.x >= 196 && it2.x <= 213) {
              var d = Math.abs(it2.y - arts[a].y);
              if (d <= bestd) { var lv = numBR(it2.str); if (lv != null && lv <= 100) { best = lv; bestd = d; } }
            }
          }
          if (best == null) {   // fallback: 1º número após o romano na mesma linha
            var after = lineStr.slice(lineStr.indexOf(m[0]) + m[0].length);
            var lm = after.match(/(\d{1,3}(?:[.,]\d+)?)/);
            if (lm) { var lv2 = numBR(lm[1]); if (lv2 != null && lv2 <= 100) best = lv2; }
          }
          subLim = best;
        }
        break;
      }
    }
    var segmento = sub ? (ART_SEGMENTO[sub.match(/\d+/)[0]] || 'Outros') : 'Disponibilidades Financeiras';
    out.ativos.push({ segmento: segmento, subclasse: sub, valorTotal: total, quantidade: qtys[i].val, limiteDAIR: subLim });
  }

  // Agregação
  out.ativos.forEach(function (at) {
    out.totalGeral += at.valorTotal;
    if (!at.subclasse) { out.disponibilidades += at.valorTotal; return; }
    out.baseLimites += at.valorTotal;
    var k = at.subclasse;
    if (!out.porSubclasse[k]) {
      out.porSubclasse[k] = { segmento: at.segmento, valor: 0, n: 0,
                              limite: (at.limiteDAIR != null ? at.limiteDAIR : LIMITES_CMN[k]),
                              limiteFonte: (at.limiteDAIR != null ? 'DAIR' : 'tabela') };
    }
    out.porSubclasse[k].valor += at.valorTotal;
    out.porSubclasse[k].n += 1;
  });
  // % e flags (limite preferencialmente o declarado no próprio DAIR)
  Object.keys(out.porSubclasse).forEach(function (k) {
    var s = out.porSubclasse[k];
    s.pct = out.baseLimites ? (100 * s.valor / out.baseLimites) : 0;
    s.excedente = (s.limite != null && s.pct > s.limite) ? (s.valor - out.baseLimites * s.limite / 100) : 0;
    s.proximo = (s.limite != null && s.pct > s.limite * 0.85 && s.pct <= s.limite);
  });

  // Autoconferência: a base somada bate com o total declarado no próprio DAIR?
  var flat = items.map(function (it) { return it.str; }).join(' ')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');   // remove acentos p/ casar "CÔMPUTO"
  var mt = flat.match(/COMPUTO\s+DOS\s+LIMITES\s*:?\s*R?\$?\s*([\d.][\d.,]*)/i);
  if (mt) {
    var tv = numBR(mt[1]);
    if (tv != null) { out.totalOficial = tv; out.conferido = Math.abs(tv - out.baseLimites) <= 1; }
  }

  out.ok = out.baseLimites > 0;
  return out;
}

/* ----- integração com a aba Enquadramento ----- */
/* === extrator de itens POSICIONADOS (todas as páginas) p/ o parser do DAIR ===
   pdf.js entrega posições em espaço de texto; aplicamos a transform do viewport
   (respeitando a rotação da página) para obter coordenadas de leitura (y p/ baixo). */
async function extrairItensPDF(blob){
  await libPDF();
  const buf = await blob.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  const U = pdfjsLib.Util;
  const items=[];
  const n = Math.min(pdf.numPages, 200);   // DAIR tem ~66 pág.; a carteira fica no fim
  for(let p=1;p<=n;p++){
    const pg = await pdf.getPage(p);
    const vp = pg.getViewport({scale:1, rotation:(pg.rotate||0)});
    const tc = await pg.getTextContent();
    for(const it of tc.items){
      if(!it.str || !it.transform) continue;
      const M = U.transform(vp.transform, it.transform);
      const a = U.applyTransform([0,0], M);
      const b = U.applyTransform([it.width||0,0], M);
      items.push({ str:it.str, x:Math.min(a[0],b[0]), w:Math.abs(b[0]-a[0]), y:Math.min(a[1],b[1]), page:p });
    }
  }
  return {items};
}

function itensDoDAIR(r){
 return Object.keys(r.porSubclasse).sort().map(function(k){
  var s=r.porSubclasse[k];
  return { desc:(SUB_NOME[k]||s.segmento)+' ['+k+']', valor:Math.round(s.valor*100)/100, cod:(SUB_TO_COD[k]||'rf_cp') };
 });
}

/* leitura do PDF da carteira */
async function anexarCarteira(){
 const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,.jpg,.jpeg,.png';
 inp.onchange=async ()=>{
  const file=inp.files[0]; if(!file)return;
  S.enq.fonte='lendo...'; S.enq.dair=null; render();
  try{
   const ehPDF = /pdf/i.test(file.type||'') || /\.pdf$/i.test(file.name||'');
   let usouDAIR=false;
   if(ehPDF){
    // 1) parser POSICIONAL do DAIR (preciso e autoconferível contra o total declarado)
    try{
     const {items}=await extrairItensPDF(file);
     const r=parseDAIRCarteira(items);
     if(r.ok && r.ativos.length){
      S.enq.dair=r; S.enq.itens=itensDoDAIR(r); S.enq.patrimonio=r.baseLimites; S.enq.ocr=false; usouDAIR=true;
     }
    }catch(e){ /* sem êxito: segue para o heurístico */ }
   }
   if(!usouDAIR){
    // 2) fallback: leitura por texto + heurística (outros layouts / PDF imagem/OCR)
    const {txt,ocr}=await extrairTexto(file,file.name);
    const itens=parseCarteira(txt);
    S.enq.itens=itens.itens; if(itens.patrimonio) S.enq.patrimonio=itens.patrimonio; S.enq.ocr=ocr; S.enq.dair=null;
   }
   S.enq.fonte=file.name;
   // guarda o arquivo como evidência da 2.6
   const id='enqfile-'+Date.now();
   try{ await dbPut({id,blob:file,name:file.name,type:file.type}); (S.anexos['2.6-1']=S.anexos['2.6-1']||[]).push({id,name:file.name,size:file.size,type:file.type,data:hoje()}); }catch(e){}
   salvar(); render();
   if(!S.enq.itens.length) alert('O PDF foi lido, mas não consegui identificar os valores por segmento automaticamente (layout não reconhecido). Lance os valores manualmente nas linhas — o cálculo funciona igual.');
  }catch(e){ S.enq.fonte=''; render(); alert('Falha na leitura: '+(e&&e.message||e)); }
 };
 inp.click();
}
/* parser heurístico: procura linhas "texto .... valor" e classifica por palavra-chave */
function parseCarteira(txt){
 const itens=[]; let patrimonio=null;
 const linhas=String(txt||'').split(/\n|\r/).map(s=>s.trim()).filter(Boolean);
 const valRe=/(\d{1,3}(?:\.\d{3})*,\d{2}|\d+,\d{2}|\d{4,})/g;
 linhas.forEach(ln=>{
  const low=norm(ln);
  if(/(patrimonio|total geral|total da carteira|total dos recursos)/.test(low)){
   const m=ln.match(valRe); if(m){ const v=brl2num(m[m.length-1]); if(v>patrimonio) patrimonio=v; }
  }
 });
 linhas.forEach(ln=>{
  const low=norm(ln);
  if(/(patrimonio|total|subtotal|saldo anterior|rentab|%)/.test(low) && !/(fundo|tesouro|acoes|imobiliar|credito|debenture|exterior|consign|fidc|multimercado|fiagro|fip)/.test(low)) return;
  let cod=null;
  for(const c in SEG_KEYS){ if(SEG_KEYS[c].some(k=>low.includes(k))){ cod=c; break; } }
  if(!cod) return;
  const m=ln.match(valRe); if(!m) return;
  // pega o maior número da linha como valor
  let v=0; m.forEach(x=>{ const n=brl2num(x); if(n>v) v=n; });
  if(v>=1000){ itens.push({desc:ln.slice(0,70),valor:v,cod}); }
 });
 return {itens,patrimonio};
}
function brl2num(s){ s=String(s).replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isFinite(n)?n:0; }

  +atual.linhas.map(l=>'<tr><td>'+esc(l.seg)+'</td><td>'+fmtBRL(l.valor)+'</td><td>'+l.pc.toFixed(1)+'%</td><td>'+l.lim+'%</td><td>'+(l.dentro?'Enquadrado':'EXCEDIDO')+'</td><td>'+(l.excV>0?'R$ '+fmtBRL(l.excV)+' ('+l.excPc.toFixed(1)+' p.p.)':'—')+'</td></tr>').join('')+'</table>';
 html+='<h2>4. Observações</h2><p>Limites confrontados conforme '+res+', que vincula os tetos de alocação aos níveis de certificação do Pró-Gestão RPPS. Os percentuais utilizados devem ser conferidos contra a redação literal da Resolução (arts. 7º a 14) e a Política de Investimentos do RPPS. Este relatório integra as evidências da ação 2.6 (Política de Investimentos) e subsidia o parecer do Comitê de Investimentos e a aprovação do Conselho Fiscal.</p>';
 html+=assinaturas([['GESTOR DE RECURSOS','Certificação vigente'],['COMITÊ DE INVESTIMENTOS','']]);
